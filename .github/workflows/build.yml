# GitHub Actions 构建 Windows exe
name: 构建通达信工具 exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装Python
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖库
      - name: 安装依赖库
        run: |
          pip install -r requirements.txt

      # 4. PyInstaller打包exe
      - name: 打包exe
        run: |
          pyinstaller --noconfirm --onefile --windowed ^
            --name "tongdaxin_tool" ^
            --add-data ".;." ^
            src/main.py

      # 5. 整理输出文件
      - name: 整理输出文件
        run: |
          if exist "dist" (
            xcopy "dist\*.exe" "." /Y
            xcopy "config.ini" "." /Y
            xcopy "requirements.txt" "." /Y
          )

      # 6. 上传exe
      - name: 上传exe
        uses: actions/upload-artifact@v4
        with:
          name: 通达信自动下载工具_exe
          path: "*.exe"
          retention-days: 30
