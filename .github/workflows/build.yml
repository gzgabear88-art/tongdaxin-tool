# GitHub Actions 构建 Windows exe
name: 构建通达信工具 exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 2. 安装Python
      - name: 安装Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖库
      - name: 安装依赖库
        run: |
          pip install -r requirements.txt
          pip list

      # 4. 检查文件结构
      - name: 检查文件
        run: |
          dir
          dir *.py

      # 5. 使用PyInstaller打包exe
      - name: 打包exe
        run: |
          pyinstaller --version
          python -c "import sys; print(sys.executable)"
          pyinstaller --noconfirm --onefile --windowed main.py 2>&1

      # 6. 检查输出
      - name: 检查输出
        run: |
          if exist "dist" (
            dir dist
          )

      # 7. 复制exe
      - name: 复制exe
        run: |
          if exist "dist\main.exe" (
            copy "dist\main.exe" "tongdaxin_tool.exe"
          )

      # 8. 上传exe
      - name: 上传exe
        uses: actions/upload-artifact@v4
        with:
          name: 通达信自动下载工具_exe
          path: "tongdaxin_tool.exe"
          retention-days: 30
