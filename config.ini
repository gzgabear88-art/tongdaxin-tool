[paths]
# ====== 重要！先修改这里！======
# 填入你的通达信安装路径，例如：
# C:\同花顺\TdxW.exe  或  D:\TongDaXin\TongDaXin.exe
# 路径需要指向包含 TdxW.exe 或 TongDaXin.exe 的文件夹
tongdaxin_path = C:\你的通达信路径

[notify]
# 手机号（国际格式），留空则不发送通知
phone_number = 

[schedule]
enabled = true
morning_time = 12:05
afternoon_time = 15:05

[log]
keep_days = 30
